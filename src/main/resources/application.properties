spring.application.name=NxtJob
server.port=${PORT:8090}

# ===============================
# DATASOURCE - MYSQL
# ===============================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/job_ai_agent}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ===============================
# CONNECTION POOL (Hikari) - Starvation Fix
# ===============================
# Increase pool size to handle more concurrent threads
spring.datasource.hikari.maximum-pool-size=${MAX_POOL:20}
# Keep connections ready to avoid "cold start" latency
spring.datasource.hikari.minimum-idle=${MIN_IDLE:10}
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=30000
# Logs a warning if a thread holds a connection for more than 2 seconds
spring.datasource.hikari.leak-detection-threshold=2000

# ===============================
# MAIL & IMAP CONFIG
# ===============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USER}
spring.mail.password=${MAIL_PASS}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

imap.host=imap.gmail.com
imap.port=993
imap.username=${MAIL_USER}
imap.password=${MAIL_PASS}

# ===============================
# LOGGING
# ===============================
logging.level.org.hibernate.SQL=DEBUG
logging.level.com.jobs.job=DEBUG